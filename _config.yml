# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Site Settings
title                    : "Ningchun Liu"
description              : ""
repository               : "zjuningchun/zjuningchun.github.io"
google_scholar_stats_use_cdn : true

# google analytics
google_analytics_id      :  # get google_analytics_id from https://analytics.google.com/analytics/

# SEO Related
google_site_verification :  # get google_site_verification from https://search.google.com/search-console/about
bing_site_verification   :  # get bing_site_verification from https://www.bing.com/webmasters/about
baidu_site_verification  :  # get baidu_site_verification from https://ziyuan.baidu.com/login/index?u=/site/index

# Site Author
author:
  name             : ""
  avatar           : "images/profile.PNG"
  bio              : ""
  location         : "Hangzhou, China"
  employer         :
  pubmed           :
  googlescholar    : "https://scholar.google.com/citations?user=vFY_HBgAAAAJ&hl=zh-CN"
  email            : "nchliu@ezju.edu.cn"
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "zjuningchun"
  google_plus      :
  keybase          :
  instagram        :
  impactstory      : # e.g., "https://profiles.impactstory.org/u/xxxx-xxxx-xxxx-xxxx"
  lastfm           :
  researchgate     : "https://researchgate.net/profile/Ningchun-Liu"
  orcid            : "https://orcid.org/0000-0002-0187-4223"
  linkedin         : # "jiangqihu"
  dblp             : "https://dblp.org/pid/309/9991.html"
  pinterest        :
  soundcloud       :
  stackoverflow    : # http://stackoverflow.com/users/123456/username
  steam            :
  tumblr           :
  twitter          : "zjuningchun"
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :


# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style


# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji


# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development

# ===================== 新增：多语言核心配置（默认英文） =====================
default_lang: "en"  # 默认语言为英文
supported_langs: ["en", "zh"]  # 支持的语言列表

# 多语言文本库（覆盖你需要切换的所有文案）
lang:
  # 英文（默认）
  en:
    site:
      title: "Ningchun Liu"
      description: "Personal Academic Homepage"
    nav:
      home: "Home"
      publications: "Publications"
      about: "About Me"
      contact: "Contact"
    author:
      location: "Hangzhou, China"
      bio: "Focus on academic research, with publications in top journals and conferences."
    button:
      switch_en: "English"
      switch_zh: "中文"
  # 中文
  zh:
    site:
      title: "刘宁春"
      description: "个人学术主页"
    nav:
      home: "首页"
      publications: "论文发表"
      about: "关于我"
      contact: "联系我"
    author:
      location: "中国杭州"
      bio: "专注于学术研究，在顶级期刊和会议上发表多篇论文。"
    button:
      switch_en: "English"
      switch_zh: "中文"